version: "3.9"

name: catalyst

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  catalyst-network:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  prometheus_data:
  grafana_data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: catalyst-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-catalyst}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-catalyst_dev_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-catalyst}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - catalyst-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: catalyst-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-catalyst_neo4j_password}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7474:7474"   # HTTP (browser)
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - catalyst-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-catalyst_neo4j_password}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: catalyst-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - catalyst-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: catalyst-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/catalyst}
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
      - "8001:8001"   # Prometheus metrics
    volumes:
      - ./backend:/app
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - catalyst-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (Parser + Graph) ──────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: catalyst-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/catalyst}
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
    networks:
      - catalyst-network
    command: celery -A app.workers.celery_app worker --loglevel=info --queues=parser,graph,simulation,prediction,telemetry

  # ── Flower (Celery UI) ──────────────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: catalyst-flower
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - catalyst-network
    command: celery -A app.workers.celery_app flower --port=5555

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: catalyst-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - catalyst-network
    command: npm run dev -- --host 0.0.0.0 --port 3000

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: catalyst-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - catalyst-network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: catalyst-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-catalyst_grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - catalyst-network

  # ── Jaeger ──────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: catalyst-jaeger
    restart: unless-stopped
    ports:
      - "6831:6831/udp"  # Agent UDP
      - "14268:14268"    # Collector HTTP
      - "16686:16686"    # UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - catalyst-network
